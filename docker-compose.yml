services:
  db:
    image: postgres:latest
    container_name: postgres_db
    ports:
      - "5432:5432"
    restart: "always"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spring_log
  adminer:
    image: adminer:latest
    container_name: adminer
    restart: "always"
    ports:
      - "8888:8080"